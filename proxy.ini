[proxy_settings]
listen_ip = 0.0.0.0
listen_port = 80
listen_ssl_port = 443
worker_threads = 2 

[localhost]
endpoint = 127.0.0.1:8080
tls_cert_file =
tls_key_file =
force_ssl = false

[example.com]
endpoint = 127.0.0.1:8081
tls_cert_file = certs/example.com.crt
tls_key_file = certs/example.com.key
force_ssl = true
