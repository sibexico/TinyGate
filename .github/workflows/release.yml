name: Release Build

on:
  release:
    types:
      - created

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.event.release.tag_name }}
  VERSION: ${{ github.event.release.tag_name }}

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev rpm dpkg-dev

      - name: Build binary
        run: |
          set -euo pipefail
          gcc -std=c2x -O3 -Wall -Wextra -pedantic main.c config.c http_parser.c -o tinygate -pthread -lssl -lcrypto

          mkdir -p out/linux-x86_64
          cp tinygate README.md LICENSE out/linux-x86_64/
          tar -C out/linux-x86_64 -czf "tinygate-${VERSION}-linux-x86_64.tar.gz" tinygate README.md LICENSE

      - name: Build deb package
        run: |
          set -euo pipefail
          DEB_VERSION="${VERSION#v}"
          if ! printf '%s' "$DEB_VERSION" | grep -Eq '^[0-9]'; then
            DEB_VERSION="0~${DEB_VERSION}"
          fi

          mkdir -p pkg/deb/DEBIAN
          mkdir -p pkg/deb/usr/local/bin
          mkdir -p pkg/deb/usr/local/share/doc/tinygate

          cp tinygate pkg/deb/usr/local/bin/tinygate
          cp README.md pkg/deb/usr/local/share/doc/tinygate/README.md
          cp LICENSE pkg/deb/usr/local/share/doc/tinygate/LICENSE

            sed -e "s/__VERSION__/${DEB_VERSION}/g" \
              -e "s/__DEB_ARCH__/amd64/g" \
              distrib/deb/control.in > pkg/deb/DEBIAN/control
          dpkg-deb --build pkg/deb "tinygate-${VERSION}-linux-x86_64.deb"

      - name: Build rpm package
        run: |
          set -euo pipefail
          RPM_VERSION="${VERSION#v}"
          RPM_VERSION="${RPM_VERSION//-/.}"
          if ! printf '%s' "$RPM_VERSION" | grep -Eq '^[0-9]'; then
            RPM_VERSION="0.${RPM_VERSION}"
          fi

          mkdir -p rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/BUILD rpmbuild/RPMS rpmbuild/SRPMS
          cp "tinygate-${VERSION}-linux-x86_64.tar.gz" rpmbuild/SOURCES/
          sed -e "s/__RPM_VERSION__/${RPM_VERSION}/g" \
              -e "s/__SOURCE_VERSION__/${VERSION}/g" \
              -e "s/__SOURCE_ARCH__/x86_64/g" \
              -e "s/__RPM_ARCH__/x86_64/g" \
              distrib/rpm/tinygate.spec.in > rpmbuild/SPECS/tinygate.spec

          rpmbuild --define "_topdir ${PWD}/rpmbuild" -bb rpmbuild/SPECS/tinygate.spec
          cp rpmbuild/RPMS/x86_64/*.rpm "tinygate-${VERSION}-linux-x86_64.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-x86_64
          if-no-files-found: error
          path: |
            tinygate-*-linux-x86_64.tar.gz
            tinygate-*-linux-x86_64.deb
            tinygate-*-linux-x86_64.rpm

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev rpm dpkg-dev

      - name: Build binary
        run: |
          set -euo pipefail
          gcc -std=c2x -O3 -Wall -Wextra -pedantic main.c config.c http_parser.c -o tinygate -pthread -lssl -lcrypto

          mkdir -p out/linux-arm64
          cp tinygate README.md LICENSE out/linux-arm64/
          tar -C out/linux-arm64 -czf "tinygate-${VERSION}-linux-arm64.tar.gz" tinygate README.md LICENSE

      - name: Build deb package
        run: |
          set -euo pipefail
          DEB_VERSION="${VERSION#v}"
          if ! printf '%s' "$DEB_VERSION" | grep -Eq '^[0-9]'; then
            DEB_VERSION="0~${DEB_VERSION}"
          fi

          mkdir -p pkg/deb/DEBIAN
          mkdir -p pkg/deb/usr/local/bin
          mkdir -p pkg/deb/usr/local/share/doc/tinygate

          cp tinygate pkg/deb/usr/local/bin/tinygate
          cp README.md pkg/deb/usr/local/share/doc/tinygate/README.md
          cp LICENSE pkg/deb/usr/local/share/doc/tinygate/LICENSE

            sed -e "s/__VERSION__/${DEB_VERSION}/g" \
              -e "s/__DEB_ARCH__/arm64/g" \
              distrib/deb/control.in > pkg/deb/DEBIAN/control
          dpkg-deb --build pkg/deb "tinygate-${VERSION}-linux-arm64.deb"

      - name: Build rpm package
        run: |
          set -euo pipefail
          RPM_VERSION="${VERSION#v}"
          RPM_VERSION="${RPM_VERSION//-/.}"
          if ! printf '%s' "$RPM_VERSION" | grep -Eq '^[0-9]'; then
            RPM_VERSION="0.${RPM_VERSION}"
          fi

          mkdir -p rpmbuild/SOURCES rpmbuild/SPECS rpmbuild/BUILD rpmbuild/RPMS rpmbuild/SRPMS
          cp "tinygate-${VERSION}-linux-arm64.tar.gz" rpmbuild/SOURCES/
          sed -e "s/__RPM_VERSION__/${RPM_VERSION}/g" \
              -e "s/__SOURCE_VERSION__/${VERSION}/g" \
              -e "s/__SOURCE_ARCH__/arm64/g" \
              -e "s/__RPM_ARCH__/aarch64/g" \
              distrib/rpm/tinygate.spec.in > rpmbuild/SPECS/tinygate.spec

          rpmbuild --define "_topdir ${PWD}/rpmbuild" -bb rpmbuild/SPECS/tinygate.spec
          cp rpmbuild/RPMS/aarch64/*.rpm "tinygate-${VERSION}-linux-arm64.rpm"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-arm64
          if-no-files-found: error
          path: |
            tinygate-*-linux-arm64.tar.gz
            tinygate-*-linux-arm64.deb
            tinygate-*-linux-arm64.rpm

  build-windows-x86_64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-openssl
            tar

      - name: Build binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          gcc -std=c2x -O2 -Wall -Wextra -pedantic main.c config.c http_parser.c -o tinygate.exe -lws2_32 -lssl -lcrypto

          mkdir -p out/windows-x86_64
          cp tinygate.exe README.md LICENSE out/windows-x86_64/
          tar -C out/windows-x86_64 -czf "tinygate-${VERSION}-windows-x86_64.tar.gz" tinygate.exe README.md LICENSE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-x86_64
          if-no-files-found: error
          path: tinygate-*-windows-x86_64.tar.gz

  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-clang
            mingw-w64-clang-aarch64-toolchain
            mingw-w64-clang-aarch64-openssl
            tar

      - name: Build binary
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd "$GITHUB_WORKSPACE"

          clang --version
          ld.lld --version || true

          clang \
            --target=aarch64-w64-windows-gnu \
            --sysroot=/clangarm64 \
            -fuse-ld=lld \
            -std=c2x -O2 -Wall -Wextra -pedantic \
            -I/clangarm64/include \
            -L/clangarm64/lib \
            main.c config.c http_parser.c \
            -o tinygate.exe \
            -lws2_32 -lssl -lcrypto

          mkdir -p out/windows-arm64
          cp tinygate.exe README.md LICENSE out/windows-arm64/
          tar -C out/windows-arm64 -czf "tinygate-${VERSION}-windows-arm64.tar.gz" tinygate.exe README.md LICENSE

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-arm64
          if-no-files-found: error
          path: tinygate-*-windows-arm64.tar.gz

  build-freebsd-x86_64:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Build binary and pkg in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.2"
          usesh: true
          copyback: true
          run: |
            set -eux
            VERSION='${{ env.VERSION }}'
            if [ -z "$VERSION" ]; then
              echo "VERSION is empty in FreeBSD VM step"
              exit 1
            fi
            PKG_VERSION="$(printf '%s' "$VERSION" | sed -e 's/^v//' -e 's/-/./g')"
            if [ -z "$PKG_VERSION" ]; then
              echo "PKG_VERSION is empty in FreeBSD VM step"
              exit 1
            fi
            case "$PKG_VERSION" in
              [0-9]*) ;;
              *) PKG_VERSION="0.${PKG_VERSION}" ;;
            esac

            env ASSUME_ALWAYS_YES=yes pkg bootstrap -f
            env ASSUME_ALWAYS_YES=yes pkg install openssl
            cc --version
            cc -std=c2x -O3 -Wall -Wextra -pedantic main.c config.c http_parser.c -o tinygate -pthread -lssl -lcrypto

            mkdir -p out/freebsd-x86_64
            cp tinygate README.md LICENSE out/freebsd-x86_64/
            tar -C out/freebsd-x86_64 -czf "tinygate-${VERSION}-freebsd-x86_64.tar.gz" tinygate README.md LICENSE

            ABI_VALUE="$(pkg config ABI)"
            ARCH_VALUE="$(uname -m)"

            mkdir -p pkgroot/usr/local/bin
            mkdir -p pkgroot/usr/local/share/doc/tinygate
            cp tinygate pkgroot/usr/local/bin/tinygate
            cp README.md pkgroot/usr/local/share/doc/tinygate/README.md
            cp LICENSE pkgroot/usr/local/share/doc/tinygate/LICENSE

            sed -e "s/__VERSION__/${PKG_VERSION}/g" \
                -e "s/__ABI__/${ABI_VALUE}/g" \
                -e "s/__ARCH__/${ARCH_VALUE}/g" \
                distrib/freebsd/manifest.ucl.in > tinygate.ucl

            pkg create -M tinygate.ucl -r pkgroot -o .
            set -- tinygate-*.pkg
            if [ "$1" = "tinygate-*.pkg" ]; then
              echo "FreeBSD package was not created"
              exit 1
            fi
            mv "$1" "tinygate-${VERSION}-freebsd-x86_64.pkg"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-freebsd-x86_64
          if-no-files-found: error
          path: |
            tinygate-*-freebsd-x86_64.tar.gz
            tinygate-*-freebsd-x86_64.pkg

  publish-release:
    needs:
      - build-linux-x86_64
      - build-linux-arm64
      - build-windows-x86_64
      - build-windows-arm64
      - build-freebsd-x86_64
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Validate release assets
        run: |
          set -euo pipefail
          file_count="$(find release-assets -maxdepth 1 -type f | wc -l)"
          if [ "$file_count" -ne 10 ]; then
            echo "Expected 10 release files, got $file_count"
            find release-assets -maxdepth 1 -type f -print
            exit 1
          fi

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
